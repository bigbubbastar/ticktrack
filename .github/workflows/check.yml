name: Check Sedaris tickets

on:
  schedule:
    # Hourly from 6am to 10pm CDT (UTC-5). When DST ends in Nov, this becomes 5am-9pm CST.
    # To keep 6am-10pm CST in winter, change to '0 0-4,12-23 * * *'.
    - cron: '0 0-3,11-23 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: node check.js
