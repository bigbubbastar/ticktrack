name: Check Sedaris tickets

on:
  schedule:
    # Runs at 8am, 2pm, 8pm CDT (UTC-5). When DST ends in Nov, these shift to 7am, 1pm, 7pm CST.
    # Adjust to '0 14,20,2 * * *' if you want to keep 8am/2pm/8pm CST in winter.
    - cron: '0 13,19,1 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: node check.js
